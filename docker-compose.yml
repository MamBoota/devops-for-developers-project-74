services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: mamboota/devops-for-developers-project-74:latest
    command: make test
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=postgres
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy  # Ждём готовности БД
    networks:
      - app-network

  # Новый сервис PostgreSQL
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge